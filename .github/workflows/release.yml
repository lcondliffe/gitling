name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  HOMEBREW_TAP_REPO: lcondliffe/homebrew-tap

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          bin=gitling
          [ "$GOOS" = windows ] && bin=gitling.exe
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$bin" ./cmd/gitling
          name="gitling_${VERSION}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = windows ]; then
            zip "${name}.zip" "$bin" README.md LICENSE
          else
            tar -czf "${name}.tar.gz" "$bin" README.md LICENSE
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gitling_*.*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: checksums
        working-directory: dist
        run: sha256sum gitling_* | tee checksums.txt

      - name: release notes
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          prev=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -n "$prev" ]; then
            range="${prev}..${TAG}"
            echo "## Changes since ${prev}" > notes.md
          else
            range="${TAG}"
            echo "## Initial release" > notes.md
          fi
          echo >> notes.md
          git log --no-merges --pretty='- %s (%h)' "$range" >> notes.md
          echo >> notes.md
          echo "**Full changelog**: https://github.com/${REPO}/commits/${TAG}" >> notes.md

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "gitling ${GITHUB_REF_NAME}" \
            --notes-file notes.md \
            dist/gitling_* dist/checksums.txt

      - name: update Homebrew tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          SOURCE_REPO: ${{ github.repository }}
          TAP_REPO: ${{ env.HOMEBREW_TAP_REPO }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping Homebrew tap update" >&2
            exit 0
          fi

          version="${TAG#v}"
          checksums="${GITHUB_WORKSPACE}/dist/checksums.txt"
          tap_dir="$(mktemp -d)"
          formula="Formula/gitling.rb"

          checksum_for() {
            asset="$1"
            awk -v asset="$asset" '$2 == asset { print $1 }' "$checksums"
          }

          darwin_amd64="$(checksum_for "gitling_${TAG}_darwin_amd64.tar.gz")"
          darwin_arm64="$(checksum_for "gitling_${TAG}_darwin_arm64.tar.gz")"
          linux_amd64="$(checksum_for "gitling_${TAG}_linux_amd64.tar.gz")"
          linux_arm64="$(checksum_for "gitling_${TAG}_linux_arm64.tar.gz")"

          for value in "$darwin_amd64" "$darwin_arm64" "$linux_amd64" "$linux_arm64"; do
            if [ -z "$value" ]; then
              echo "Missing expected checksum in ${checksums}" >&2
              exit 1
            fi
          done

          gh repo clone "$TAP_REPO" "$tap_dir"
          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "gitling-${TAG}"
          mkdir -p Formula
          cat > "$formula" <<EOF
          class Gitling < Formula
            desc "At-a-glance git repository dashboard for the terminal"
            homepage "https://github.com/${SOURCE_REPO}"
            version "${version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${SOURCE_REPO}/releases/download/${TAG}/gitling_${TAG}_darwin_arm64.tar.gz"
                sha256 "${darwin_arm64}"
              else
                url "https://github.com/${SOURCE_REPO}/releases/download/${TAG}/gitling_${TAG}_darwin_amd64.tar.gz"
                sha256 "${darwin_amd64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${SOURCE_REPO}/releases/download/${TAG}/gitling_${TAG}_linux_arm64.tar.gz"
                sha256 "${linux_arm64}"
              else
                url "https://github.com/${SOURCE_REPO}/releases/download/${TAG}/gitling_${TAG}_linux_amd64.tar.gz"
                sha256 "${linux_amd64}"
              end
            end

            def install
              bin.install "gitling"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/gitling --version")
            end
          end
          EOF
          sed -i 's/^          //' "$formula"

          if git diff --quiet; then
            echo "Homebrew formula already up to date for ${TAG}"
            exit 0
          fi

          git add "$formula"
          git commit -m "gitling ${TAG}"
          git push origin "gitling-${TAG}"
          gh pr create \
            --title "gitling ${TAG}" \
            --body "Update gitling formula for ${TAG}.\n\nSource release: https://github.com/${SOURCE_REPO}/releases/tag/${TAG}" \
            --head "gitling-${TAG}" \
            --base main
