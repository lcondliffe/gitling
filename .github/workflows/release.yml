name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          bin=gitling
          [ "$GOOS" = windows ] && bin=gitling.exe
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$bin" ./cmd/gitling
          name="gitling_${VERSION}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = windows ]; then
            zip "${name}.zip" "$bin" README.md LICENSE
          else
            tar -czf "${name}.tar.gz" "$bin" README.md LICENSE
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gitling_*.*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: checksums
        working-directory: dist
        run: sha256sum gitling_* | tee checksums.txt

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "gitling ${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/gitling_* dist/checksums.txt
